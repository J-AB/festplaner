<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎪 Vereins-Manager Pro</title>
<style>
  :root { --bg: #0d0d14; --panel: #16213e; --accent: #c8a45a; --text: #e8e8f0; --danger: #ff4444; --warning: #ffbb33; --safe: #00c851; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; height: 100dvh; overflow: hidden; }

  /* Sidebar & Layout */
  #sidebar { width: 280px; background: #0a0a15; border-right: 1px solid #2a2a4a; display: flex; flex-direction: column; transition: transform 0.3s ease; position: absolute; top: 0; bottom: 0; left: 0; z-index: 2000; }
  .sidebar-hidden { transform: translateX(-100%); }
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 1500; }
  #content { flex: 1; display: flex; flex-direction: column; width: 100%; min-width: 0; }

  /* Header & Dual Filter Bar */
  #header { background: linear-gradient(135deg,#1a1a2e, #0f3460); padding: 15px; border-bottom: 1px solid #2a2a5a; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  
  .filter-area { background: #0a0a15; border-bottom: 1px solid #252545; }
  .filter-row { display: flex; gap: 8px; padding: 8px 12px; overflow-x: auto; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }

  /* Icons Filter Style */
  .icon-filter { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 10px; flex-shrink: 0; background: #1a1a30; border: 1px solid #3a3a6a; color: #fff; cursor: pointer; }
  .icon-filter.active { border-color: var(--accent); background: var(--panel); box-shadow: 0 0 10px rgba(200,164,90,0.2); }

  /* User Filter Style */
  .user-filter { padding: 6px 14px; border-radius: 20px; background: #1a1a30; border: 1px solid #3a3a6a; font-size: 12px; color: #fff; cursor: pointer; white-space: nowrap; }
  .user-filter.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat-card { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; text-align: center; }
  .stat-val { display: block; font-size: 13px; font-weight: bold; color: var(--accent); }
  .stat-lbl { font-size: 9px; color: #7070a0; }

  /* Tasks */
  #main-scroll { flex: 1; overflow-y: auto; padding: 15px; }
  .task-card { background: #0f0f20; border-radius: 14px; padding: 12px; border: 1px solid #252545; border-left: 5px solid #3a3a6a; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .status-overdue { border-left-color: var(--danger); background: #251515; }
  .status-urgent { border-left-color: var(--warning); background: #252015; }
  .status-done { opacity: 0.4; border-left-color: var(--safe); }
  
  .cat-box { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .task-info { flex: 1; min-width: 0; }
  .cd-badge { font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; background: #3a3a6a; color: #fff; }

  /* Modals */
  .btn { padding: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-ghost { background: #1a1a30; color: #fff; border: 1px solid #3a3a6a; }
  .form-input { width: 100%; background: #0d0d1a; border: 1px solid #3a3a6a; border-radius: 10px; color: #fff; padding: 12px; margin-bottom: 12px; }
  #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-box { background: #12121f; border: 1px solid #3a3a6a; border-radius: 20px; padding: 25px; width: 100%; max-width: 450px; max-height: 85vh; overflow-y: auto; }

  @media (min-width: 1024px) { #sidebar { position: relative; transform: none; } #overlay { display: none !important; } }
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="login-screen">
  <div class="modal-box" style="max-width: 350px;">
    <h2 style="text-align:center; margin-bottom:20px">🎪 Vereins-Login</h2>
    <input type="text" id="login-user" class="form-input" placeholder="Benutzername" onkeypress="if(event.key==='Enter') document.getElementById('login-pass').focus()">
    <input type="password" id="login-pass" class="form-input" placeholder="Passwort" onkeypress="if(event.key==='Enter') handleLogin()">
    <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">Einloggen</button>
    <p id="login-msg" style="color:var(--danger); margin-top:15px; text-align:center; font-size:13px"></p>
  </div>
</div>

<aside id="sidebar" class="sidebar-hidden">
  <div style="padding:20px; border-bottom:1px solid #2a2a4a"><h3>📂 Deine Feste</h3></div>
  <div id="event-list-ui" style="flex:1; overflow-y:auto; padding:10px"></div>
  <div id="admin-tools" style="padding:15px; border-top:1px solid #2a2a4a; display:none">
    <button class="btn btn-ghost" style="width:100%; margin-bottom:10px" onclick="openUserMgmt()">👥 User & Rollen</button>
    <button class="btn btn-ghost" style="width:100%" onclick="openEventModal()">+ Neues Fest</button>
  </div>
  <div style="padding:15px; background: #050510;">
    <div id="user-info" style="font-size:11px; margin-bottom:10px; color:var(--accent)"></div>
    <button class="btn btn-ghost" style="width:100%; color:var(--danger)" onclick="location.reload()">Abmelden</button>
  </div>
</aside>

<main id="content">
  <header id="header">
    <div class="top-bar">
      <div style="display:flex; align-items:center; gap:12px">
        <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:24px">☰</button>
        <h2 id="current-event-name" style="font-size:18px">Fest wählen...</h2>
      </div>
      <button id="admin-ev-edit" class="btn btn-ghost" style="display:none" onclick="openEventEdit()">⚙️</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><span class="stat-lbl">Fortschritt</span><span class="stat-val" id="stat-progress">0%</span></div>
      <div class="stat-card"><span class="stat-lbl">Kosten Ist</span><span class="stat-val" id="stat-budget">***</span></div>
      <div class="stat-card"><span class="stat-lbl">Tage</span><span class="stat-val" id="stat-days">-</span></div>
    </div>
  </header>

  <div class="filter-area">
    <div class="filter-row" id="cat-filters"></div>
    <div class="filter-row" id="user-filters"></div>
  </div>

  <div id="main-scroll">
    <div id="task-list"></div>
    <button class="btn btn-primary" id="add-btn" onclick="addTask()" style="width:100%; margin-top:20px; display:none; position:sticky; bottom:0">+ Aufgabe hinzufügen</button>
  </div>
</main>

<div id="event-edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:20px">
  <div class="modal-box">
    <h3>Fest-Einstellungen</h3>
    <label>Name</label><input type="text" id="ev-edit-name" class="form-input">
    <label>Datum</label><input type="date" id="ev-edit-date" class="form-input">
    <div style="display:flex; gap:10px">
      <button class="btn btn-danger" onclick="deleteEvent()">🗑️ Löschen</button>
      <button class="btn btn-ghost" style="flex:1" onclick="this.closest('#event-edit-modal').style.display='none'">Abbr.</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveEventEdit()">Speichern</button>
    </div>
  </div>
</div>

<div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:20px">
  <div class="modal-box">
    <h3>Aufgabe bearbeiten</h3>
    <input type="text" id="ed-title" class="form-input">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <div><label>Kategorie</label><select id="ed-cat" class="form-input"></select></div>
      <div><label>Zuständig</label><select id="ed-assignee" class="form-input"></select></div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <div><label>Wochen davor</label><input type="number" id="ed-weeks" class="form-input"></div>
      <div id="finance-field"><label>Ist Kosten €</label><input type="number" id="ed-cost-i" class="form-input"></div>
    </div>
    <textarea id="ed-notes" class="form-input" placeholder="Notizen..."></textarea>
    <div style="display:flex; gap:10px">
      <button class="btn btn-danger" onclick="deleteTask()">🗑️</button>
      <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('edit-modal').style.display='none'">Abbr.</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveEdit()">Speichern</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBgEL-pylLEkGJfv7g5NxMsupH-teoD7wA",
    authDomain: "musikfest-planer.firebaseapp.com",
    databaseURL: "https://musikfest-planer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "musikfest-planer"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const CATEGORIES = {
    zelt:        { label: "Zelt", icon: "⛺", color: "#c8a45a" },
    behoerde:    { label: "Amt",  icon: "🏛️", color: "#7ab8d4" },
    programm:    { label: "Musik", icon: "🎵", color: "#9b7ec8" },
    presse:      { label: "Presse", icon: "📰", color: "#6bbf8e" },
    lieferanten: { label: "Gastro", icon: "🍺", color: "#e07b5a" },
    finanzen:    { label: "Geld",   icon: "💰", color: "#d4a847" },
    sonstiges:   { label: "Sonst.", icon: "⚙️", color: "#888888" }
  };

  let state = { 
    events: {}, users: {}, currentUser: null, 
    currentEventId: null, 
    catFilter: 'all', 
    userFilter: 'all' 
  };

  db.ref('festplaner_v3').on('value', snap => {
    const data = snap.val();
    if(data) {
      state.events = data.events || {};
      state.users = data.users || {};
      render();
    }
  });

  function handleLogin() {
    const u = document.getElementById("login-user").value.toLowerCase().trim();
    const p = document.getElementById("login-pass").value.trim();
    const user = state.users[u] || (u === 'admin' && p === '1234' ? {name:'admin', pass:'1234', role:0} : null);
    if(user && user.pass === p) {
      state.currentUser = user;
      state.userFilter = user.name; // Standardmäßig eigene Aufgaben zeigen
      document.getElementById("login-screen").style.display = "none";
      if(user.role == 0) document.getElementById("admin-tools").style.display = "block";
      document.getElementById("user-info").innerHTML = `User: <b>${user.name}</b>`;
      document.getElementById("add-btn").style.display = "block";
      render();
    } else { document.getElementById("login-msg").textContent = "Falsche Daten!"; }
  }

  function render() {
    if(!state.currentUser) return;

    // Sidebar
    document.getElementById("event-list-ui").innerHTML = Object.entries(state.events).map(([id, ev]) => `
      <div style="padding:12px; background:#1a1a30; border-radius:10px; margin-bottom:8px; border:1px solid ${id===state.currentEventId?'var(--accent)':'transparent'}" onclick="selectEvent('${id}')">
        <b>${ev.name}</b>
      </div>
    `).join('');

    if(!state.currentEventId) return;
    const ev = state.events[state.currentEventId];
    document.getElementById("current-event-name").textContent = ev.name;
    document.getElementById("admin-ev-edit").style.display = (state.currentUser.role == 0) ? "block" : "none";

    // 1. Kategorien (Nur Icons)
    let catHtml = `<div class="icon-filter ${state.catFilter==='all'?'active':''}" onclick="state.catFilter='all';render()">ALL</div>`;
    Object.entries(CATEGORIES).forEach(([key, cat]) => {
      catHtml += `<div class="icon-filter ${state.catFilter===key?'active':''}" onclick="state.catFilter='${key}';render()" title="${cat.label}">${cat.icon}</div>`;
    });
    document.getElementById("cat-filters").innerHTML = catHtml;

    // 2. Personen Filter
    const activeUsers = [...new Set((ev.tasks || []).map(t => t.assignee).filter(Boolean))];
    let userHtml = `<div class="user-filter ${state.userFilter==='all'?'active':''}" onclick="state.userFilter='all';render()">Alle Personen</div>`;
    userHtml += `<div class="user-filter ${state.userFilter===state.currentUser.name?'active':''}" onclick="state.userFilter='${state.currentUser.name}';render()">✨ Meine Aufgaben</div>`;
    activeUsers.forEach(u => {
      if(u !== state.currentUser.name) {
        userHtml += `<div class="user-filter ${state.userFilter===u?'active':''}" onclick="state.userFilter='${u}';render()">${u}</div>`;
      }
    });
    document.getElementById("user-filters").innerHTML = userHtml;

    // Task Logic
    let tasks = ev.tasks || [];
    if(state.catFilter !== 'all') tasks = tasks.filter(t => t.category === state.catFilter);
    if(state.userFilter !== 'all') tasks = tasks.filter(t => t.assignee === state.userFilter);

    // Stats & List (same as before)
    const done = tasks.filter(t => t.done).length;
    document.getElementById("stat-progress").textContent = (tasks.length ? Math.round(done/tasks.length*100) : 0) + "%";
    if(state.currentUser.role <= 1) document.getElementById("stat-budget").textContent = tasks.reduce((sum, t) => sum + (parseFloat(t.costI) || 0), 0).toLocaleString() + " €";
    const dLeft = ev.date ? Math.ceil((new Date(ev.date) - new Date()) / 86400000) : null;
    document.getElementById("stat-days").textContent = (dLeft !== null && !isNaN(dLeft)) ? dLeft : "-";

    document.getElementById("task-list").innerHTML = tasks.sort((a,b) => a.done - b.done).map(t => {
      let diff = 999;
      if(ev.date) {
        const dl = new Date(new Date(ev.date).getTime() - (t.weeksBefore || 0) * 7 * 86400000);
        diff = Math.ceil((dl - new Date()) / 86400000);
      }
      const cat = CATEGORIES[t.category] || CATEGORIES.sonstiges;
      return `
        <div class="task-card ${t.done?'status-done':(diff<0?'status-overdue':(diff<=7?'status-urgent':''))}">
          <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})" style="width:22px; height:22px">
          <div class="cat-box" style="background:${cat.color}22; color:${cat.color}">${cat.icon}</div>
          <div class="task-info" onclick="openEdit(${t.id})">
            <div style="font-weight:bold; font-size:14px">${t.title}</div>
            <div style="font-size:11px; color:#7070a0">${t.assignee || 'Offen'} • <span class="cd-badge ${diff<0?'cd-overdue':''}">${t.done?'Erledigt':(diff<0?'Überfällig!':'Noch '+diff+' Tg.')}</span></div>
          </div>
          <span onclick="openEdit(${t.id})">✏️</span>
        </div>
      `;
    }).join('');
  }

  // Hilfsfunktionen (identisch zu vorher, nur für Kontext hier)
  function selectEvent(id) { state.currentEventId = id; render(); toggleMenu(); }
  function toggleMenu() { document.getElementById("sidebar").classList.toggle("sidebar-hidden"); document.getElementById("overlay").style.display = document.getElementById("sidebar").classList.contains("sidebar-hidden") ? "none" : "block"; }
  function toggleTask(id) {
    const tasks = state.events[state.currentEventId].tasks;
    const idx = tasks.findIndex

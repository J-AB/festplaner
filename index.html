<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎪 Vereins-Manager PRO+</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="login-screen">
  <div class="modal-box" style="max-width: 350px;">
    <h2 style="text-align:center; margin-bottom:20px">🎪 Vereins-Login</h2>
    <input type="text" id="login-user" class="form-input" placeholder="Benutzername">
    <input type="password" id="login-pass" class="form-input" placeholder="Passwort" onkeydown="if(event.key==='Enter')handleLogin()">
    <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">Einloggen</button>
  </div>
</div>

<aside id="sidebar" class="sidebar-hidden">
  <div style="padding:20px; border-bottom:1px solid #2a2a4a">
    <button class="btn btn-primary" style="width:100%" onclick="selectEvent('home')">🏠 Übersicht</button>
  </div>
  <div id="event-list-ui" style="flex:1; overflow-y:auto; padding:10px"></div>
  <div id="admin-tools" style="padding:15px; border-top:1px solid #2a2a4a; display:none">
    <button class="btn btn-ghost" style="width:100%; margin-bottom:10px" onclick="openUserMgmt()">👥 Benutzer</button>
    <button class="btn btn-ghost" style="width:100%" onclick="openEventModal()">+ Neues Fest</button>
  </div>
  <div style="padding:15px; background: #050510;">
    <div id="user-info" style="font-size:11px; margin-bottom:10px; color:var(--accent)"></div>
    <button class="btn btn-ghost" style="width:100%; color:var(--danger)" onclick="localStorage.clear(); location.reload();">Abmelden</button>
  </div>
</aside>

<main id="content">
  <header id="header">
    <div style="display:flex; align-items:center; justify-content:space-between">
      <div style="display:flex; align-items:center; gap:12px">
        <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:24px">☰</button>
        <h2 id="current-event-name" style="font-size:18px">Lade...</h2>
      </div>
      <button id="admin-ev-edit" class="btn btn-ghost" style="display:none" onclick="openEventEdit()">⚙️</button>
    </div>
    <div class="stats-grid" id="stats-ui" style="display:none">
      <div class="stat-card"><span class="stat-lbl">Aufgaben</span><span class="stat-val" id="stat-progress">-</span></div>
      <div class="stat-card" id="stat-budget-card"><span class="stat-lbl">Kosten</span><span class="stat-val" id="stat-budget">0 €</span></div>
      <div class="stat-card"><span class="stat-lbl">Zeit bis</span><span class="stat-val" id="stat-days">-</span></div>
    </div>
  </header>

  <div class="filter-area" id="filter-container" style="display:none">
    <div class="filter-row" id="cat-filters"></div>
    <div class="filter-row" id="user-filters"></div>
  </div>

  <div id="main-scroll">
    <div id="task-list"></div>
    <button class="btn btn-primary" id="add-btn" onclick="addTask()" style="width:100%; margin-top:20px; display:none">+ Aufgabe hinzufügen</button>
  </div>
</main>

<div id="edit-modal" class="modal-overlay">
  <div class="modal-box">
    <h3>Aufgabe bearbeiten</h3>
    <input type="text" id="ed-title" class="form-input" placeholder="Titel">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <div><label>Kategorie</label><select id="ed-cat" class="form-input"></select></div>
      <div><label>Deadline (Wo. vorher)</label><input type="number" id="ed-weeks" class="form-input"></div>
    </div>
    <div id="ed-cost-field"><label>Geplante Kosten (€)</label><input type="number" id="ed-cost" class="form-input"></div>
    <label>Verantwortlich</label><select id="ed-assignee" class="form-input"></select>
    <label>Abhängig von</label><select id="ed-pretask" class="form-input"></select>
    <label>Notizen</label><textarea id="ed-notes" class="form-input" rows="3"></textarea>
    <div style="display:flex; gap:10px; margin-top:15px">
      <button class="btn btn-primary" style="flex:2" onclick="saveEdit()">Speichern</button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeModals()">Abbruch</button>
      <button class="btn btn-ghost" style="color:var(--danger)" onclick="deleteTask()">🗑️</button>
    </div>
  </div>
</div>

<div id="event-edit-modal" class="modal-overlay">
  <div class="modal-box">
    <h3>Fest-Einstellungen</h3>
    <label>Name</label><input type="text" id="ev-edit-name" class="form-input">
    <label>Datum</label><input type="date" id="ev-edit-date" class="form-input">
    <label style="margin-top:15px; display:block">Berechtigungen</label>
    <div id="event-roles-list" style="max-height:200px; overflow-y:auto; margin-bottom:15px"></div>
    <button class="btn btn-primary" style="width:100%; margin-bottom:10px" onclick="saveEventEdit()">Speichern</button>
    <button class="btn btn-ghost" style="width:100%; margin-bottom:10px" onclick="closeModals()">Schließen</button>
    <button class="btn btn-ghost" style="width:100%; color:var(--danger)" onclick="deleteEvent()">⚠️ Fest komplett löschen</button>
  </div>
</div>

<div id="user-mgmt-modal" class="modal-overlay">
  <div class="modal-box">
    <h3>Benutzerverwaltung</h3>
    <div id="user-list-admin" style="margin-bottom:20px"></div>
    <h4>Neuer Benutzer</h4>
    <input type="text" id="new-u-name" class="form-input" placeholder="Name">
    <input type="text" id="new-u-pass" class="form-input" placeholder="Passwort">
    <button class="btn btn-primary" style="width:100%" onclick="createNewUser()">Hinzufügen</button>
    <button class="btn btn-ghost" style="width:100%; margin-top:10px" onclick="closeModals()">Schließen</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="script.js"></script>

</body>
</html>

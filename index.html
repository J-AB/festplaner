<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎪 Vereins-Manager Pro</title>
<style>
  :root { --bg: #0d0d14; --panel: #16213e; --accent: #c8a45a; --text: #e8e8f0; --danger: #ff4444; --warning: #ffbb33; --safe: #00c851; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; height: 100dvh; overflow: hidden; }

  #sidebar { width: 280px; background: #0a0a15; border-right: 1px solid #2a2a4a; display: flex; flex-direction: column; transition: transform 0.3s ease; position: absolute; top: 0; bottom: 0; left: 0; z-index: 2000; }
  .sidebar-hidden { transform: translateX(-100%); }
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 1500; }
  #content { flex: 1; display: flex; flex-direction: column; width: 100%; min-width: 0; }

  #header { background: linear-gradient(135deg,#1a1a2e, #0f3460); padding: 15px; border-bottom: 1px solid #2a2a5a; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  
  .filter-area { background: #0a0a15; border-bottom: 1px solid #252545; }
  .filter-row { display: flex; gap: 8px; padding: 8px 12px; overflow-x: auto; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }

  .icon-filter { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 10px; flex-shrink: 0; background: #1a1a30; border: 1px solid #3a3a6a; cursor: pointer; }
  .icon-filter.active { border-color: var(--accent); background: var(--panel); }
  
  .user-filter { padding: 6px 14px; border-radius: 20px; background: #1a1a30; border: 1px solid #3a3a6a; font-size: 12px; color: #fff; cursor: pointer; white-space: nowrap; }
  .user-filter.active { background: var(--accent); color: #000; border-color: var(--accent); }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat-card { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; text-align: center; }
  .stat-val { display: block; font-size: 13px; font-weight: bold; color: var(--accent); }
  .stat-lbl { font-size: 9px; color: #7070a0; }

  #main-scroll { flex: 1; overflow-y: auto; padding: 15px; }
  .event-group-header { margin: 20px 0 10px; font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #252545; padding-bottom: 5px; }
  
  .task-card { background: #0f0f20; border-radius: 14px; padding: 12px; border: 1px solid #252545; border-left: 5px solid #3a3a6a; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .status-overdue { border-left-color: var(--danger); background: #251515; }
  .status-urgent { border-left-color: var(--warning); background: #252015; }
  .status-done { opacity: 0.4; border-left-color: var(--safe); }
  
  .cat-box { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .task-info { flex: 1; min-width: 0; }
  .cd-badge { font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; background: #3a3a6a; color: #fff; }

  .btn { padding: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 13px; text-align: center; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-ghost { background: #1a1a30; color: #fff; border: 1px solid #3a3a6a; }
  .btn-danger { background: var(--danger); color: #fff; }
  .form-input { width: 100%; background: #0d0d1a; border: 1px solid #3a3a6a; border-radius: 10px; color: #fff; padding: 12px; margin-bottom: 12px; font-size: 16px; }
  
  #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-box { background: #12121f; border: 1px solid #3a3a6a; border-radius: 20px; padding: 25px; width: 100%; max-width: 450px; max-height: 85vh; overflow-y: auto; }

  @media (min-width: 1024px) { #sidebar { position: relative; transform: none; } #overlay { display: none !important; } }
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="login-screen">
  <div class="modal-box" style="max-width: 350px;">
    <h2 style="text-align:center; margin-bottom:20px">🎪 Vereins-Login</h2>
    <input type="text" id="login-user" class="form-input" placeholder="Benutzername">
    <input type="password" id="login-pass" class="form-input" placeholder="Passwort" onkeydown="if(event.key==='Enter')handleLogin()">
    <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">Einloggen</button>
  </div>
</div>

<aside id="sidebar" class="sidebar-hidden">
  <div style="padding:20px; border-bottom:1px solid #2a2a4a">
    <button class="btn btn-primary" style="width:100%" onclick="selectEvent('home')">🏠 Home (Alle Aufgaben)</button>
  </div>
  <div id="event-list-ui" style="flex:1; overflow-y:auto; padding:10px"></div>
  <div id="admin-tools" style="padding:15px; border-top:1px solid #2a2a4a; display:none">
    <button class="btn btn-ghost" style="width:100%; margin-bottom:10px" onclick="openUserMgmt()">👥 User & Rollen</button>
    <button class="btn btn-ghost" style="width:100%" onclick="openEventModal()">+ Neues Fest</button>
  </div>
  <div style="padding:15px; background: #050510;">
    <div id="user-info" style="font-size:11px; margin-bottom:10px; color:var(--accent)"></div>
    <button class="btn btn-ghost" style="width:100%; color:var(--danger)" onclick="location.reload()">Abmelden</button>
  </div>
</aside>

<main id="content">
  <header id="header">
    <div class="top-bar">
      <div style="display:flex; align-items:center; gap:12px">
        <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:24px">☰</button>
        <h2 id="current-event-name" style="font-size:18px">Meine Aufgaben</h2>
      </div>
      <button id="admin-ev-edit" class="btn btn-ghost" style="display:none" onclick="openEventEdit()">⚙️</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><span class="stat-lbl">Aufgaben</span><span class="stat-val" id="stat-progress">-</span></div>
      <div class="stat-card"><span class="stat-lbl">Kosten Ist</span><span class="stat-val" id="stat-budget">0 €</span></div>
      <div class="stat-card"><span class="stat-lbl">Tage</span><span class="stat-val" id="stat-days">-</span></div>
    </div>
  </header>

  <div class="filter-area" id="filter-container">
    <div class="filter-row" id="cat-filters"></div>
    <div class="filter-row" id="user-filters"></div>
  </div>

  <div id="main-scroll">
    <div id="task-list"></div>
    <button class="btn btn-primary" id="add-btn" onclick="addTask()" style="width:100%; margin-top:20px; display:none; position:sticky; bottom:0">+ Aufgabe hinzufügen</button>
  </div>
</main>

<div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:20px">
  <div class="modal-box" onkeydown="if(event.key==='Enter' && event.target.tagName!=='TEXTAREA')saveEdit()">
    <h3 id="modal-task-origin" style="font-size:12px; color:var(--accent)">Festname</h3>
    <input type="text" id="ed-title" class="form-input">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <div><label>Kategorie</label><select id="ed-cat" class="form-input"></select></div>
      <div><label>Zuständig</label><select id="ed-assignee" class="form-input"></select></div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <div><label>Wochen davor</label><input type="number" id="ed-weeks" class="form-input"></div>
      <div id="finance-field"><label>Ist Kosten €</label><input type="number" id="ed-cost-i" class="form-input"></div>
    </div>
    <textarea id="ed-notes" class="form-input" placeholder="Notizen..."></textarea>
    <div style="display:flex; gap:10px">
      <button class="btn btn-danger" onclick="deleteTask()">🗑️</button>
      <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('edit-modal').style.display='none'">Abbr.</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveEdit()">Speichern</button>
    </div>
  </div>
</div>

<div id="event-edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:20px">
  <div class="modal-box">
    <h3>Fest bearbeiten</h3>
    <label>Festname</label>
    <input type="text" id="ev-edit-name" class="form-input">
    <label>Datum</label>
    <input type="date" id="ev-edit-date" class="form-input">
    <div style="display:flex; gap:10px; margin-top:10px">
      <button class="btn btn-danger" onclick="deleteEvent()">🗑️ Fest löschen</button>
      <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('event-edit-modal').style.display='none'">Abbr.</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveEventEdit()">Speichern</button>
    </div>
  </div>
</div>

<div id="user-mgmt-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3500; align-items:center; justify-content:center; padding:20px">
  <div class="modal-box">
    <h3>👥 Benutzerverwaltung</h3>
    <div id="user-list-admin" style="margin:15px 0; max-height:200px; overflow-y:auto; border:1px solid #3a3a6a; padding:10px; border-radius:10px"></div>
    <h4>Neuer Benutzer</h4>
    <input type="text" id="new-u-name" class="form-input" placeholder="Name">
    <input type="text" id="new-u-pass" class="form-input" placeholder="Passwort" onkeydown="if(event.key==='Enter')createNewUser()">
    <select id="new-u-role" class="form-input">
      <option value="1">Planer (Vollzugriff)</option>
      <option value="2">Helfer (Nur Status)</option>
    </select>
    <button class="btn btn-primary" style="width:100%" onclick="createNewUser()">Hinzufügen</button>
    <button class="btn btn-ghost" style="width:100%; margin-top:10px" onclick="document.getElementById('user-mgmt-modal').style.display='none'">Schließen</button>
  </div>
</div>

<div id="event-modal-ui" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:20px">
  <div class="modal-box">
    <h3>Neues Fest</h3>
    <input type="text" id="ev-name" class="form-input" placeholder="Name" onkeydown="if(event.key==='Enter')saveNewEvent()">
    <input type="date" id="ev-date" class="form-input">
    <button class="btn btn-primary" style="width:100%" onclick="saveNewEvent()">Anlegen</button>
    <button class="btn btn-ghost" style="width:100%; margin-top:10px" onclick="document.getElementById('event-modal-ui').style.display='none'">Abbrechen</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBgEL-pylLEkGJfv7g5NxMsupH-teoD7wA",
    authDomain: "musikfest-planer.firebaseapp.com",
    databaseURL: "https://musikfest-planer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "musikfest-planer"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const CATEGORIES = {
    location:    { label: "Location",     color: "#c8a45a", icon: "⛺" },
    amt:         { label: "Amt",          color: "#7ab8d4", icon: "🏛️" },
    programm:    { label: "Programm",     color: "#9b7ec8", icon: "🎵" },
    werbung:     { label: "Werbung",      color: "#6bbf8e", icon: "📰" },
    bestellungen:{ label: "Bestellungen", color: "#e07b5a", icon: "🍺" },
    finanzen:    { label: "Finanzen",     color: "#d4a847", icon: "💰" },
    sonstiges:   { label: "Sonstiges",    color: "#888888", icon: "⚙️" }
  };

  let state = { events: {}, users: {}, currentUser: null, currentEventId: 'home', catFilter: 'all', userFilter: 'all' };
  let activeTaskId = null;
  let activeTaskEventId = null;

  db.ref('festplaner_v3').on('value', snap => {
    const data = snap.val();
    state.events = data?.events || {};
    state.users = data?.users || {};
    render();
  });

  function handleLogin() {
    const u = document.getElementById("login-user").value.toLowerCase().trim();
    const p = document.getElementById("login-pass").value.trim();
    const user = (u === 'admin' && p === '1234') ? {name:'admin', pass:'1234', role:0} : state.users[u];
    if(user && user.pass === p) {
      state.currentUser = user;
      document.getElementById("login-screen").style.display = "none";
      if(user.role == 0) document.getElementById("admin-tools").style.display = "block";
      document.getElementById("user-info").innerHTML = `User: <b>${user.name}</b>`;
      state.currentEventId = 'home';
      render();
    } else { alert("Login fehlgeschlagen!"); }
  }

  function render() {
    if(!state.currentUser) return;

    document.getElementById("event-list-ui").innerHTML = Object.entries(state.events).map(([id, ev]) => `
      <div style="padding:10px; background:#1a1a30; border-radius:8px; margin-bottom:5px; cursor:pointer; border:1px solid ${id===state.currentEventId?'var(--accent)':'transparent'}" onclick="selectEvent('${id}')">
        ${ev.name}
      </div>
    `).join('');

    const taskList = document.getElementById("task-list");
    const filterContainer = document.getElementById("filter-container");
    const addBtn = document.getElementById("add-btn");

    if(state.currentEventId === 'home') {
      document.getElementById("current-event-name").textContent = "Meine Aufgaben";
      document.getElementById("admin-ev-edit").style.display = "none";
      filterContainer.style.display = "none";
      addBtn.style.display = "none";

      let html = "";
      Object.entries(state.events).forEach(([evId, ev]) => {
        let myTasks = (ev.tasks || []).filter(t => t.assignee === state.currentUser.name && !t.done);
        if(myTasks.length > 0) {
          html += `<div class="event-group-header">${ev.name}</div>`;
          myTasks.sort((a,b) => getDiff(ev.date, a) - getDiff(ev.date, b)).forEach(t => {
            html += renderTaskCard(t, evId, ev.date);
          });
        }
      });
      taskList.innerHTML = html || "<p style='text-align:center; padding:40px; color:#7070a0'>Keine offenen Aufgaben für dich.</p>";
    } else {
      const ev = state.events[state.currentEventId];
      if(!ev) { selectEvent('home'); return; }
      document.getElementById("current-event-name").textContent = ev.name;
      document.getElementById("admin-ev-edit").style.display = (state.currentUser.role == 0) ? "block" : "none";
      filterContainer.style.display = "block";
      addBtn.style.display = (state.currentUser.role <= 1) ? "block" : "none";
      renderFilters(ev);
      let tasks = ev.tasks || [];
      if(state.catFilter !== 'all') tasks = tasks.filter(t => t.category === state.catFilter);
      if(state.userFilter !== 'all') tasks = tasks.filter(t => t.assignee === state.userFilter);
      taskList.innerHTML = tasks.sort((a,b) => a.done - b.done).map(t => renderTaskCard(t, state.currentEventId, ev.date)).join('');
    }
  }

  function getDiff(evDate, t) {
    if(!evDate) return 999;
    const dl = new Date(new Date(evDate).getTime() - (t.weeksBefore || 0) * 7 * 86400000);
    return Math.ceil((dl - new Date()) / 86400000);
  }

  function renderTaskCard(t, evId, evDate) {
    const diff = getDiff(evDate, t);
    const cat = CATEGORIES[t.category] || CATEGORIES.sonstiges;
    return `
      <div class="task-card ${t.done?'status-done':(diff<0?'status-overdue':(diff<=7?'status-urgent':''))}">
        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${evId}', ${t.id})" style="width:22px; height:22px">
        <div class="cat-box" style="background:${cat.color}22; color:${cat.color}">${cat.icon}</div>
        <div class="task-info" onclick="openEdit('${evId}', ${t.id})">
          <div style="font-weight:bold">${t.title}</div>
          <div style="font-size:11px; color:#7070a0">${t.assignee || 'Offen'} • <span class="cd-badge">${t.done?'✓':(diff<0?'Fällig!':'Noch '+diff+' Tg.')}</span></div>
        </div>
      </div>`;
  }

  function renderFilters(ev) {
    let catHtml = `<div class="icon-filter ${state.catFilter==='all'?'active':''}" onclick="state.catFilter='all';render()">🌍</div>`;
    Object.entries(CATEGORIES).forEach(([k, c]) => { catHtml += `<div class="icon-filter ${state.catFilter===k?'active':''}" onclick="state.catFilter='${k}';render()">${c.icon}</div>`; });
    document.getElementById("cat-filters").innerHTML = catHtml;

    const activeUsers = [...new Set((ev.tasks || []).map(t => t.assignee).filter(Boolean))];
    let userHtml = `<div class="user-filter ${state.userFilter==='all'?'active':''}" onclick="state.userFilter='all';render()">Alle</div>`;
    activeUsers.forEach(u => { userHtml += `<div class="user-filter ${state.userFilter===u?'active':''}" onclick="state.userFilter='${u}';render()">${u}</div>`; });
    document.getElementById("user-filters").innerHTML = userHtml;
  }

  // --- ACTIONS (TASKS) ---
  function openEdit(evId, taskId) {
    if(state.currentUser.role > 1) return;
    activeTaskEventId = evId;
    activeTaskId = taskId;
    const t = state.events[evId].tasks.find(x => x.id === taskId);
    document.getElementById("modal-task-origin").textContent = state.events[evId].name;
    document.getElementById("ed-title").value = t.title;
    document.getElementById("ed-weeks").value = t.weeksBefore || 0;
    document.getElementById("ed-cost-i").value = t.costI || 0;
    document.getElementById("ed-notes").value = t.notes || "";
    document.getElementById("ed-cat").innerHTML = Object.entries(CATEGORIES).map(([k,c]) => `<option value="${k}" ${t.category===k?'selected':''}>${c.icon} ${c.label}</option>`).join('');
    
    const selectableUsers = Object.values(state.users).filter(u => u.role !== 0);
    document.getElementById("ed-assignee").innerHTML = '<option value="">Offen</option>' + 
      selectableUsers.map(u => `<option value="${u.name}" ${t.assignee===u.name?'selected':''}>${u.name}</option>`).join('');
    
    document.getElementById("edit-modal").style.display = "flex";
  }

  function saveEdit() {
    const tasks = [...state.events[activeTaskEventId].tasks];
    const idx = tasks.findIndex(x => x.id === activeTaskId);
    tasks[idx].title = document.getElementById("ed-title").value;
    tasks[idx].category = document.getElementById("ed-cat").value;
    tasks[idx].weeksBefore = parseInt(document.getElementById("ed-weeks").value) || 0;
    tasks[idx].assignee = document.getElementById("ed-assignee").value;
    tasks[idx].notes = document.getElementById("ed-notes").value;
    tasks[idx].costI = parseFloat(document.getElementById("ed-cost-i").value) || 0;
    db.ref('festplaner_v3/events/' + activeTaskEventId + '/tasks').set(tasks);
    document.getElementById("edit-modal").style.display = "none";
  }

  function deleteTask() {
    if(!confirm("Aufgabe wirklich löschen?")) return;
    const tasks = state.events[activeTaskEventId].tasks.filter(x => x.id !== activeTaskId);
    db.ref('festplaner_v3/events/' + activeTaskEventId + '/tasks').set(tasks);
    document.getElementById("edit-modal").style.display = "none";
  }

  function toggleTask(evId, id) {
    const tasks = [...state.events[evId].tasks];
    const idx = tasks.findIndex(x => x.id === id);
    tasks[idx].done = !tasks[idx].done;
    db.ref('festplaner_v3/events/' + evId + '/tasks').set(tasks);
  }

  function addTask() {
    const tasks = state.events[state.currentEventId].tasks || [];
    const id = Date.now();
    tasks.push({ id, title: "Neue Aufgabe", category: "sonstiges", done: false, weeksBefore: 1, assignee: "" });
    db.ref('festplaner_v3/events/' + state.currentEventId + '/tasks').set(tasks);
    openEdit(state.currentEventId, id);
  }

  // --- ACTIONS (EVENTS) ---
  function openEventEdit() {
    const ev = state.events[state.currentEventId];
    document.getElementById("ev-edit-name").value = ev.name;
    document.getElementById("ev-edit-date").value = ev.date || "";
    document.getElementById("event-edit-modal").style.display = "flex";
  }

  function saveEventEdit() {
    const name = document.getElementById("ev-edit-name").value;
    const date = document.getElementById("ev-edit-date").value;
    if(name) {
      db.ref('festplaner_v3/events/' + state.currentEventId).update({ name, date });
      document.getElementById("event-edit-modal").style.display = "none";
    }
  }

  function deleteEvent() {
    if(!confirm("Das gesamte Fest und alle zugehörigen Aufgaben löschen?")) return;
    db.ref('festplaner_v3/events/' + state.currentEventId).remove();
    document.getElementById("event-edit-modal").style.display = "none";
    selectEvent('home');
  }

  // --- ADMIN TOOLS ---
  function openUserMgmt() {
    document.getElementById("user-list-admin").innerHTML = Object.values(state.users).map(u => `
      <div style="display:flex; justify-content:space-between; margin-bottom:5px; background:#1a1a30; padding:8px; border-radius:5px">
        <span>${u.name} (${u.role==1?'Planer':'Helfer'})</span> 
        ${u.name !== 'admin' ? `<button onclick="deleteUser('${u.name}')" style="color:red; background:none; border:none">✖</button>` : ''}
      </div>`).join('');
    document.getElementById("user-mgmt-modal").style.display = "flex";
  }
  function createNewUser() {
    const name = document.getElementById("new-u-name").value.toLowerCase().trim();
    const pass = document.getElementById("new-u-pass").value.trim();
    const role = parseInt(document.getElementById("new-u-role").value);
    if(name && pass) db.ref('festplaner_v3/users/' + name).set({name, pass, role}).then(() => {
      document.getElementById("new-u-name").value = "";
      document.getElementById("new-u-pass").value = "";
      openUserMgmt();
    });
  }
  function deleteUser(n) { if(confirm("User löschen?")) db.ref('festplaner_v3/users/' + n).remove().then(openUserMgmt); }
  function saveNewEvent() {
    const name = document.getElementById("ev-name").value;
    if(name) {
      const id = 'ev_' + Date.now();
      db.ref('festplaner_v3/events/' + id).set({ name, date: document.getElementById("ev-date").value, tasks: [] });
      document.getElementById("event-modal-ui").style.display = "none";
      selectEvent(id);
    }
  }

  function selectEvent(id) { state.currentEventId = id; render(); if(window.innerWidth < 1024) toggleMenu(); }
  function toggleMenu() { document.getElementById("sidebar").classList.toggle("sidebar-hidden"); document.getElementById("overlay").style.display = document.getElementById("sidebar").classList.contains("sidebar-hidden") ? "none" : "block"; }
  function openEventModal() { document.getElementById("event-modal-ui").style.display = "flex"; }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎪 Vereins-Manager v4 PRO</title>
<style>
  :root { --bg: #0d0d14; --panel: #16213e; --accent: #c8a45a; --text: #e8e8f0; --danger: #ff4444; --warning: #ffbb33; --safe: #00c851; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; height: 100dvh; overflow: hidden; }

  /* Layout & Navigation */
  #sidebar { width: 280px; background: #0a0a15; border-right: 1px solid #2a2a4a; display: flex; flex-direction: column; transition: transform 0.3s ease; position: absolute; top: 0; bottom: 0; left: 0; z-index: 2000; }
  .sidebar-hidden { transform: translateX(-100%); }
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 1500; }
  #content { flex: 1; display: flex; flex-direction: column; width: 100%; min-width: 0; }

  /* Header & Stats */
  #header { background: linear-gradient(135deg,#1a1a2e, #0f3460); padding: 15px; border-bottom: 1px solid #2a2a5a; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 8px; margin-top: 10px; }
  .stat-card { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; text-align: center; }
  .stat-val { display: block; font-size: 13px; font-weight: bold; color: var(--accent); }
  .stat-lbl { font-size: 9px; color: #7070a0; text-transform: uppercase; }

  /* Filter */
  .filter-area { background: #0a0a15; border-bottom: 1px solid #252545; }
  .filter-row { display: flex; gap: 8px; padding: 8px 12px; overflow-x: auto; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }

  .icon-filter { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 12px; flex-shrink: 0; background: #1a1a30; border: 1px solid #3a3a6a; cursor: pointer; }
  .icon-filter.active { border-color: var(--accent); background: var(--panel); box-shadow: 0 0 10px rgba(200,164,90,0.2); }
  
  .user-filter { padding: 6px 14px; border-radius: 20px; background: #1a1a30; border: 1px solid #3a3a6a; font-size: 11px; color: #fff; cursor: pointer; white-space: nowrap; }
  .user-filter.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* Task Cards */
  .task-card { background: #0f0f20; border-radius: 14px; padding: 12px; border: 1px solid #252545; border-left: 5px solid #3a3a6a; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
  .status-done { opacity: 0.5; border-left-color: var(--safe) !important; filter: grayscale(0.5); }
  .status-overdue { border-left-color: var(--danger) !important; background: rgba(255, 68, 68, 0.05); }
  .status-urgent { border-left-color: var(--warning) !important; }
  
  .cat-box { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .task-info { flex: 1; min-width: 0; }
  .meta-row { display: flex; gap: 6px; margin-top: 6px; font-size: 10px; align-items: center; flex-wrap: wrap; }
  .cd-badge { font-weight: bold; padding: 2px 6px; border-radius: 4px; background: #2a2a4a; color: #a0a0c0; }
  .cd-badge.urgent { color: var(--warning); }
  .cd-badge.overdue { color: var(--danger); font-weight: 800; }

  /* UI Elements */
  .btn { padding: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 13px; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-ghost { background: #1a1a30; color: #fff; border: 1px solid #3a3a6a; }
  .btn-danger { background: var(--danger); color: #fff; }
  .form-input { width: 100%; background: #0d0d1a; border: 1px solid #3a3a6a; border-radius: 10px; color: #fff; padding: 12px; margin-bottom: 12px; font-size: 16px; }

  #main-scroll { flex: 1; overflow-y: auto; padding: 15px; }
  #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: flex; align-items: center; justify-content: center; }
  .modal-box { background: #12121f; border: 1px solid #3a3a6a; border-radius: 20px; padding: 25px; width: 100%; max-width: 450px; max-height: 85vh; overflow-y: auto; }

  @media (min-width: 1024px) { #sidebar { position: relative; transform: none; } #overlay { display: none !important; } }
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="login-screen">
  <div class="modal-box" style="max-width: 350px;">
    <h2 style="text-align:center; margin-bottom:20px">🎪 Vereins-Login</h2>
    <input type="text" id="login-user" class="form-input" placeholder="Benutzername">
    <input type="password" id="login-pass" class="form-input" placeholder="Passwort" onkeydown="if(event.key==='Enter')handleLogin()">
    <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">Einloggen</button>
  </div>
</div>

<aside id="sidebar" class="sidebar-hidden">
  <div style="padding:20px; border-bottom:1px solid #2a2a4a">
    <button class="btn btn-primary" style="width:100%" onclick="selectEvent('home')">🏠 Übersicht</button>
  </div>
  <div id="event-list-ui" style="flex:1; overflow-y:auto; padding:10px"></div>
  <div id="admin-tools" style="padding:15px; border-top:1px solid #2a2a4a; display:none">
    <button class="btn btn-ghost" style="width:100%; margin-bottom:10px" onclick="openUserMgmt()">👥 Benutzer</button>
    <button class="btn btn-ghost" style="width:100%" onclick="openEventModal()">+ Neues Fest</button>
  </div>
  <div style="padding:15px; background: #050510;">
    <div id="user-info" style="font-size:11px; margin-bottom:10px; color:var(--accent)"></div>
    <button class="btn btn-ghost" style="width:100%; color:var(--danger)" onclick="location.reload()">Abmelden</button>
  </div>
</aside>

<main id="content">
  <header id="header">
    <div style="display:flex; align-items:center; justify-content:space-between">
      <div style="display:flex; align-items:center; gap:12px">
        <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:24px">☰</button>
        <h2 id="current-event-name" style="font-size:18px">Lade...</h2>
      </div>
      <button id="admin-ev-edit" class="btn btn-ghost" style="display:none" onclick="openEventEdit()">⚙️</button>
    </div>
    <div class="stats-grid" id="stats-ui" style="display:none">
      <div class="stat-card"><span class="stat-lbl">Fortschritt</span><span class="stat-val" id="stat-progress">-</span></div>
      <div class="stat-card"><span class="stat-lbl">Kosten Ist</span><span class="stat-val" id="stat-budget">0 €</span></div>
      <div class="stat-card"><span class="stat-lbl">Countdown</span><span class="stat-val" id="stat-days">-</span></div>
    </div>
  </header>

  <div class="filter-area" id="filter-container" style="display:none">
    <div class="filter-row" id="cat-filters"></div>
    <div class="filter-row" id="user-filters"></div>
  </div>

  <div id="main-scroll">
    <div id="task-list"></div>
    <button class="btn btn-primary" id="add-btn" onclick="addTask()" style="width:100%; margin-top:20px; display:none">+ Aufgabe hinzufügen</button>
  </div>
</main>

<div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:20px">
  <div class="modal-box">
    <h3>Aufgabe bearbeiten</h3>
    <input type="text" id="ed-title" class="form-input" placeholder="Titel">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <div><label style="font-size:11px">Kategorie</label><select id="ed-cat" class="form-input"></select></div>
      <div><label style="font-size:11px">Zuständig</label><select id="ed-assignee" class="form-input"></select></div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <div><label style="font-size:11px">Wochen vorher</label><input type="number" id="ed-weeks" class="form-input"></div>
      <div><label style="font-size:11px">Ist-Kosten €</label><input type="number" id="ed-cost" class="form-input"></div>
    </div>
    <textarea id="ed-notes" class="form-input" placeholder="Notizen..." style="height:80px"></textarea>
    <div style="display:flex; gap:10px">
      <button class="btn btn-danger" id="del-task-btn" onclick="deleteTask()">🗑️</button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeModals()">Abbr.</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveEdit()">Speichern</button>
    </div>
  </div>
</div>

<div id="event-edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:20px">
  <div class="modal-box">
    <h3>Fest-Einstellungen</h3>
    <input type="text" id="ev-edit-name" class="form-input">
    <input type="date" id="ev-edit-date" class="form-input">
    <h4 style="margin: 10px 0; color: var(--accent); font-size: 14px;">👥 Rollen</h4>
    <div id="event-roles-list" style="margin-bottom: 15px; max-height: 150px; overflow-y: auto;"></div>
    <button class="btn btn-ghost" style="width:100%; margin-bottom:10px" onclick="document.getElementById('csv-file').click()">📂 CSV Import</button>
    <input type="file" id="csv-file" style="display:none" accept=".csv" onchange="importCSV()">
    <div style="display:flex; gap:10px">
      <button class="btn btn-danger" onclick="deleteEvent()">🗑️</button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeModals()">Abbr.</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveEventEdit()">Speichern</button>
    </div>
  </div>
</div>

<div id="user-mgmt-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3500; align-items:center; justify-content:center; padding:20px">
  <div class="modal-box">
    <h3>👥 Benutzerverwaltung</h3>
    <div id="user-list-admin" style="margin-bottom:15px; max-height: 200px; overflow-y: auto;"></div>
    <input type="text" id="new-u-name" class="form-input" placeholder="Name">
    <input type="text" id="new-u-pass" class="form-input" placeholder="Passwort">
    <button class="btn btn-primary" style="width:100%" onclick="createNewUser()">Anlegen</button>
    <button class="btn btn-ghost" style="width:100%; margin-top:10px" onclick="closeModals()">X</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBgEL-pylLEkGJfv7g5NxMsupH-teoD7wA",
    authDomain: "musikfest-planer.firebaseapp.com",
    databaseURL: "https://musikfest-planer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "musikfest-planer"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const CATEGORIES = {
    location:    { label: "Location",     color: "#c8a45a", icon: "⛺" },
    amt:         { label: "Amt",          color: "#7ab8d4", icon: "🏛️" },
    programm:    { label: "Programm",     color: "#9b7ec8", icon: "🎵" },
    werbung:     { label: "Werbung",      color: "#6bbf8e", icon: "📰" },
    bestellungen:{ label: "Bestellungen", color: "#e07b5a", icon: "🍺" },
    finanzen:    { label: "Finanzen",     color: "#d4a847", icon: "💰" },
    sonstiges:   { label: "Sonstiges",    color: "#888888", icon: "⚙️" }
  };

  let state = { events: {}, users: {}, currentUser: null, currentEventId: 'home', catFilter: 'all', userFilter: 'all' };
  let activeTaskId = null, activeTaskEventId = null;

  db.ref('festplaner_v4').on('value', snap => {
    state.events = snap.val()?.events || {};
    state.users = snap.val()?.users || {};
    render();
  });

  function handleLogin() {
    const u = document.getElementById("login-user").value.toLowerCase().trim();
    const p = document.getElementById("login-pass").value.trim();
    const adminUser = (u === 'admin' && p === '1234') ? {name:'admin', pass:'1234', isAdmin: true} : null;
    const user = adminUser || state.users[u];
    if(user && user.pass === p) {
      state.currentUser = user;
      document.getElementById("login-screen").style.display = "none";
      if(user.isAdmin) document.getElementById("admin-tools").style.display = "block";
      document.getElementById("user-info").innerHTML = `User: <b>${user.name}</b>`;
      render();
    } else alert("Login falsch!");
  }

  function getMyRole(evId) {
    if(state.currentUser?.isAdmin) return 'planer';
    return state.events[evId]?.roles?.[state.currentUser.name] || 'keine';
  }

  function getDaysUntilDeadline(evDate, t) {
    if (!evDate || !t.weeks) return 999;
    const deadline = new Date(new Date(evDate).getTime() - (t.weeks * 7 * 86400000));
    const diffTime = deadline - new Date();
    return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  }

  function render() {
    if(!state.currentUser) return;
    const sortedEvents = Object.entries(state.events).sort((a,b) => new Date(a[1].date||0) - new Date(b[1].date||0));
    
    // Sidebar
    document.getElementById("event-list-ui").innerHTML = sortedEvents.map(([id, ev]) => {
        const role = getMyRole(id);
        const myTasks = (ev.tasks || []).filter(t => t.assignee === state.currentUser.name && !t.done);
        if(!state.currentUser.isAdmin && role === 'keine' && myTasks.length === 0) return '';
        return `<div style="padding:10px; background:#1a1a30; border-radius:8px; margin-bottom:5px; cursor:pointer; border:1px solid ${id===state.currentEventId?'var(--accent)':'transparent'}" onclick="selectEvent('${id}')">
            <div style="font-weight:bold; font-size:13px">${ev.name}</div>
            <div style="font-size:9px; color:var(--accent)">${role} ${myTasks.length>0?'• '+myTasks.length:''}</div>
        </div>`;
    }).join('');

    const taskList = document.getElementById("task-list");
    const filterArea = document.getElementById("filter-container");
    const statsArea = document.getElementById("stats-ui");

    if(state.currentEventId === 'home') {
        document.getElementById("current-event-name").textContent = "Meine Aufgaben";
        filterArea.style.display = "none";
        statsArea.style.display = "none";
        document.getElementById("admin-ev-edit").style.display = "none";
        document.getElementById("add-btn").style.display = "none";
        let html = "";
        sortedEvents.forEach(([evId, ev]) => {
            const my = (ev.tasks || []).filter(t => t.assignee === state.currentUser.name && !t.done);
            if(my.length > 0) {
                html += `<div style="color:var(--accent); margin:15px 0 5px; font-size:11px; border-bottom:1px solid #222; padding-bottom:3px;">${ev.name}</div>`;
                my.sort((a,b) => getDaysUntilDeadline(ev.date, a) - getDaysUntilDeadline(ev.date, b))
                  .forEach(t => html += renderTaskCard(t, evId, ev.date));
            }
        });
        taskList.innerHTML = html || "<p style='text-align:center; opacity:0.5; margin-top:40px;'>Alles erledigt! 😎</p>";
    } else {
        const ev = state.events[state.currentEventId];
        const role = getMyRole(state.currentEventId);
        document.getElementById("current-event-name").textContent = ev.name;
        filterArea.style.display = "block";
        statsArea.style.display = "grid";
        document.getElementById("admin-ev-edit").style.display = (role === 'planer') ? "block" : "none";
        document.getElementById("add-btn").style.display = (role !== 'keine') ? "block" : "none";

        // Filter UI
        let catHtml = `<div class="icon-filter ${state.catFilter==='all'?'active':''}" onclick="state.catFilter='all';render()">🌍</div>`;
        Object.entries(CATEGORIES).forEach(([k, c]) => {
            catHtml += `<div class="icon-filter ${state.catFilter===k?'active':''}" onclick="state.catFilter='${k}';render()">${c.icon}</div>`;
        });
        document.getElementById("cat-filters").innerHTML = catHtml;

        const activeUsers = [...new Set((ev.tasks || []).map(t => t.assignee).filter(Boolean))];
        let userHtml = `<div class="user-filter ${state.userFilter==='all'?'active':''}" onclick="state.userFilter='all';render()">Alle</div>`;
        userHtml += `<div class="user-filter ${state.userFilter==='me'?'active':''}" onclick="state.userFilter='me';render()">Meine</div>`;
        activeUsers.forEach(u => { if(u !== state.currentUser.name) userHtml += `<div class="user-filter ${state.userFilter===u?'active':''}" onclick="state.userFilter='${u}';render()">${u}</div>`; });
        document.getElementById("user-filters").innerHTML = userHtml;

        // Stats Logic
        const allTasks = ev.tasks || [];
        const doneTasks = allTasks.filter(t => t.done).length;
        const totalCost = allTasks.reduce((sum, t) => sum + (parseFloat(t.cost) || 0), 0);
        const daysLeft = ev.date ? Math.ceil((new Date(ev.date) - new Date()) / 86400000) : '-';
        const weeksLeft = ev.date ? (daysLeft / 7).toFixed(1) : '-';
        
        document.getElementById("stat-progress").textContent = `${doneTasks} / ${allTasks.length}`;
        document.getElementById("stat-budget").textContent = `${totalCost.toFixed(0)} €`;
        document.getElementById("stat-days").innerHTML = `${weeksLeft} <small style="font-size:8px">Wo.</small> / ${daysLeft} <small style="font-size:8px">Tg.</small>`;

        // Task Filtering & Sorting
        let tasks = [...allTasks];
        if(state.catFilter !== 'all') tasks = tasks.filter(t => t.category === state.catFilter);
        if(state.userFilter === 'me') tasks = tasks.filter(t => t.assignee === state.currentUser.name);
        else if(state.userFilter !== 'all') tasks = tasks.filter(t => t.assignee === state.userFilter);
        
        // SORTIERUNG: Offen (nach Zeit) -> Erledigt (unten)
        tasks.sort((a, b) => {
            if (a.done !== b.done) return a.done - b.done; 
            return getDaysUntilDeadline(ev.date, a) - getDaysUntilDeadline(ev.date, b);
        });

        taskList.innerHTML = tasks.length ? tasks.map(t => renderTaskCard(t, state.currentEventId, ev.date)).join('') : "Keine Aufgaben gefunden.";
    }
  }

  function renderTaskCard(t, evId, evDate) {
    const role = getMyRole(evId);
    const canEdit = (role === 'planer') || (t.assignee === state.currentUser.name) || (!t.assignee && role !== 'keine');
    const cat = CATEGORIES[t.category] || CATEGORIES.sonstiges;
    const diff = getDaysUntilDeadline(evDate, t);
    
    let statusClass = "", cdLabel = "Offen", cdClass = "";
    if (t.done) { 
        statusClass = "status-done"; cdLabel = "✓"; 
    } else if (evDate && t.weeks) {
        if (diff < 0) { statusClass = "status-overdue"; cdLabel = "Fällig!"; cdClass = "overdue"; }
        else if (diff <= 7) { statusClass = "status-urgent"; cdLabel = diff + " Tg."; cdClass = "urgent"; }
        else { cdLabel = diff + " Tg."; }
    }

    const noteHtml = t.notes ? `<div style="font-size:11px; color:#a0a0b0; margin:4px 0; font-style:italic; border-left:2px solid #3a3a6a; padding-left:8px; line-height:1.3; overflow:hidden; text-overflow:ellipsis;">${t.notes}</div>` : '';
    const stampColor = t.done ? "var(--safe)" : "#505070";
    const stampHtml = t.lastChanged ? `<span style="color:${stampColor}; font-size:9px; margin-left:auto; opacity:0.7;">✍️ ${t.lastChanged}</span>` : '';

    return `
      <div class="task-card ${statusClass}">
        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${evId}', ${t.id})" style="width:22px; height:22px; cursor:pointer">
        <div class="cat-box" style="background:${cat.color}22; color:${cat.color}">${cat.icon}</div>
        <div class="task-info" onclick="${canEdit ? `openEdit('${evId}', ${t.id})` : ''}">
          <div style="font-weight:bold; font-size:14px; display:flex; justify-content:space-between; align-items:center;">
            <span>${t.title}</span>
            ${t.cost ? `<span style="color:var(--safe); font-size:11px;">${t.cost}€</span>` : ''}
          </div>
          ${noteHtml}
          <div class="meta-row">
            <span class="cd-badge ${cdClass}">${cdLabel}</span>
            <span style="color:#707090">${t.assignee || '👤 Offen'}</span>
            ${stampHtml}
          </div>
        </div>
      </div>`;
  }

  function toggleTask(evId, id) {
    const tasks = [...state.events[evId].tasks];
    const idx = tasks.findIndex(x => x.id === id);
    tasks[idx].done = !tasks[idx].done;
    
    const user = state.currentUser.name;
    const now = new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit' });

    if (tasks[idx].done) {
        tasks[idx].lastChanged = `${now} - ${user}`;
        tasks[idx].doneDate = now;
    } else {
        tasks[idx].lastChanged = `Offen - ${user}`;
        delete tasks[idx].doneDate;
    }
    
    db.ref(`festplaner_v4/events/${evId}/tasks`).set(tasks);
  }

  function saveEdit() {
    const tasks = [...state.events[activeTaskEventId].tasks];
    const idx = tasks.findIndex(x => x.id === activeTaskId);
    
    tasks[idx].title = document.getElementById("ed-title").value;
    tasks[idx].category = document.getElementById("ed-cat").value;
    tasks[idx].weeks = parseInt(document.getElementById("ed-weeks").value) || 0;
    tasks[idx].cost = parseFloat(document.getElementById("ed-cost").value) || 0;
    tasks[idx].notes = document.getElementById("ed-notes").value;
    tasks[idx].assignee = document.getElementById("ed-assignee").value;
    
    tasks[idx].lastChanged = `${new Date().toLocaleDateString('de-DE')} - ${state.currentUser.name}`;

    db.ref(`festplaner_v4/events/${activeTaskEventId}/tasks`).set(tasks);
    closeModals();
  }

  // --- UI Helpers ---
  function selectEvent(id) { state.currentEventId = id; state.catFilter = 'all'; state.userFilter = 'all'; render(); if(window.innerWidth < 1024) toggleMenu(); }
  function toggleMenu() { document.getElementById("sidebar").classList.toggle("sidebar-hidden"); document.getElementById("overlay").style.display = document.getElementById("sidebar").classList.contains("sidebar-hidden") ? "none" : "block"; }
  function closeModals() { document.querySelectorAll('[id$="-modal"]').forEach(m => m.style.display = "none"); document.getElementById("edit-modal").style.display="none"; }

  function openEdit(evId, taskId) {
    activeTaskEventId = evId; activeTaskId = taskId;
    const t = state.events[evId].tasks.find(x => x.id === taskId);
    document.getElementById("ed-title").value = t.title;
    document.getElementById("ed-weeks").value = t.weeks || 0;
    document.getElementById("ed-cost").value = t.cost || 0;
    document.getElementById("ed-notes").value = t.notes || "";
    document.getElementById("ed-cat").innerHTML = Object.entries(CATEGORIES).map(([k,c]) => `<option value="${k}" ${t.category===k?'selected':''}>${c.icon} ${c.label}</option>`).join('');
    const uList = Object.keys(state.events[evId].roles || {}).filter(n => state.events[evId].roles[n] !== 'keine');
    document.getElementById("ed-assignee").innerHTML = '<option value="">Offen</option>' + uList.map(u => `<option value="${u}" ${t.assignee===u?'selected':''}>${u}</option>`).join('');
    document.getElementById("edit-modal").style.display = "flex";
  }

  function addTask() {
    const tasks = state.events[state.currentEventId].tasks || [];
    const id = Date.now();
    const role = getMyRole(state.currentEventId);
    tasks.push({ id, title: "Neue Aufgabe", category: state.catFilter==='all'?'sonstiges':state.catFilter, done: false, assignee: (role==='planer'?'':state.currentUser.name) });
    db.ref(`festplaner_v4/events/${state.currentEventId}/tasks`).set(tasks);
    openEdit(state.currentEventId, id);
  }

  function openEventEdit() {
    const ev = state.events[state.currentEventId];
    document.getElementById("ev-edit-name").value = ev.name;
    document.getElementById("ev-edit-date").value = ev.date || "";
    let h = "";
    Object.values(state.users).forEach(u => {
        const r = ev.roles?.[u.name] || 'keine';
        h += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; background:#1a1a30; padding:8px; border-radius:5px; font-size:12px;">
            <span>${u.name}</span>
            <select onchange="db.ref('festplaner_v4/events/${state.currentEventId}/roles/${u.name}').set(this.value)" style="background:#000; color:#fff;">
                <option value="keine" ${r==='keine'?'selected':''}>Aus</option>
                <option value="planer" ${r==='planer'?'selected':''}>Planer</option>
                <option value="helfer" ${r==='helfer'?'selected':''}>Helfer</option>
                <option value="exklusiv" ${r==='exklusiv'?'selected':''}>Exklusiv</option>
            </select></div>`;
    });
    document.getElementById("event-roles-list").innerHTML = h;
    document.getElementById("event-edit-modal").style.display = "flex";
  }

  function saveEventEdit() { db.ref(`festplaner_v4/events/${state.currentEventId}`).update({name: document.getElementById("ev-edit-name").value, date: document.getElementById("ev-edit-date").value}); closeModals(); }
  function deleteEvent() { if(confirm("Dieses Fest wirklich komplett löschen?")) { db.ref(`festplaner_v4/events/${state.currentEventId}`).remove(); selectEvent('home'); closeModals(); } }
  function deleteTask() { if(confirm("Aufgabe löschen?")) { const tasks = state.events[activeTaskEventId].tasks.filter(x => x.id !== activeTaskId); db.ref(`festplaner_v4/events/${activeTaskEventId}/tasks`).set(tasks); closeModals(); } }

  function openUserMgmt() {
    document.getElementById("user-list-admin").innerHTML = Object.values(state.users).map(u => `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #222; font-size:12px;"><span>${u.name}</span><button onclick="db.ref('festplaner_v4/users/${u.name}').remove()" style="color:red; background:none; border:none">✖</button></div>`).join('');
    document.getElementById("user-mgmt-modal").style.display = "flex";
  }

  function createNewUser() {
    const n = document.getElementById("new-u-name").value.toLowerCase().trim();
    const p = document.getElementById("new-u-pass").value.trim();
    if(n && p && n !== 'admin') db.ref('festplaner_v4/users/'+n).set({name:n, pass:p});
    document.getElementById("new-u-name").value=""; document.getElementById("new-u-pass").value="";
  }

  function openEventModal() {
    const n = prompt("Name des neuen Festes?");
    if(n) db.ref('festplaner_v4/events/ev_'+Date.now()).set({name:n, tasks: [], roles: {}});
  }

  function importCSV() {
    const f = document.getElementById('csv-file').files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = (e) => {
        const tasks = state.events[state.currentEventId].tasks || [];
        e.target.result.split(/\r?\n/).forEach((l, i) => {
            if(i===0 || !l.trim()) return;
            const c = l.split(l.includes(';')?';':',').map(x => x.trim().replace(/^"|"$/g, ''));
            if(c[0]) tasks.push({ id: Date.now()+Math.random(), title: c[0], category: c[1]||"sonstiges", weeks: c[2]||0, notes: c[3]||"", cost: 0, done: false, assignee: "" });
        });
        db.ref(`festplaner_v4/events/${state.currentEventId}/tasks`).set(tasks);
        closeModals();
    };
    r.readAsText(f);
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎪 Vereins-Manager v5.1</title>
<style>
  :root { --bg: #0d0d14; --panel: #16213e; --accent: #c8a45a; --text: #e8e8f0; --danger: #ff4444; --warning: #ffbb33; --safe: #00c851; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; height: 100dvh; overflow: hidden; }

  #sidebar { width: 280px; background: #0a0a15; border-right: 1px solid #2a2a4a; display: flex; flex-direction: column; transition: transform 0.3s ease; position: absolute; top: 0; bottom: 0; left: 0; z-index: 2000; }
  .sidebar-hidden { transform: translateX(-100%); }
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 1500; }
  #content { flex: 1; display: flex; flex-direction: column; width: 100%; min-width: 0; }

  #header { background: linear-gradient(135deg,#1a1a2e, #0f3460); padding: 15px; border-bottom: 1px solid #2a2a5a; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 8px; margin-top: 10px; }
  .stat-card { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; text-align: center; }
  .stat-val { display: block; font-size: 12px; font-weight: bold; color: var(--accent); }
  .stat-lbl { font-size: 9px; color: #7070a0; text-transform: uppercase; }

  .task-card { background: #0f0f20; border-radius: 14px; padding: 12px; border: 1px solid #252545; border-left: 5px solid #3a3a6a; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .status-done { opacity: 0.5; border-left-color: var(--safe) !important; }
  .cat-box { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .task-info { flex: 1; min-width: 0; }
  
  .btn { padding: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 13px; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-ghost { background: #1a1a30; color: #fff; border: 1px solid #3a3a6a; }
  .btn-danger { background: var(--danger); color: #fff; }
  .form-input { width: 100%; background: #0d0d1a; border: 1px solid #3a3a6a; border-radius: 10px; color: #fff; padding: 10px; margin-bottom: 10px; font-size: 14px; }

  #main-scroll { flex: 1; overflow-y: auto; padding: 15px; }
  #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: flex; align-items: center; justify-content: center; }
  .modal-box { background: #12121f; border: 1px solid #3a3a6a; border-radius: 20px; padding: 20px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; }

  /* Rollen-Grid im Editor */
  .role-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #1a1a30; border-radius: 10px; margin-bottom: 5px; }
  .role-btns { display: flex; gap: 4px; }
  .role-btn { padding: 4px 8px; font-size: 10px; border-radius: 5px; border: 1px solid #3a3a6a; background: #0d0d1a; color: #fff; cursor: pointer; }
  .role-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  @media (min-width: 1024px) { #sidebar { position: relative; transform: none; } #overlay { display: none !important; } }
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="login-screen">
  <div class="modal-box" style="max-width: 350px;">
    <h2 style="text-align:center; margin-bottom:20px">🎪 Vereins-Login</h2>
    <input type="text" id="login-user" class="form-input" placeholder="Benutzername">
    <input type="password" id="login-pass" class="form-input" placeholder="Passwort" onkeydown="if(event.key==='Enter')handleLogin()">
    <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">Einloggen</button>
  </div>
</div>

<aside id="sidebar" class="sidebar-hidden">
  <div style="padding:20px; border-bottom:1px solid #2a2a4a">
    <button class="btn btn-primary" style="width:100%" onclick="selectEvent('home')">🏠 Übersicht</button>
  </div>
  <div id="event-list-ui" style="flex:1; overflow-y:auto; padding:10px"></div>
  <div id="admin-tools" style="padding:15px; border-top:1px solid #2a2a4a; display:none">
    <button class="btn btn-ghost" style="width:100%; margin-bottom:10px" onclick="openUserMgmt()">👥 Benutzer-Pool</button>
    <button class="btn btn-ghost" style="width:100%" onclick="openEventModal()">+ Neues Fest</button>
  </div>
  <div style="padding:15px; background: #050510;">
    <div id="user-info" style="font-size:11px; margin-bottom:10px; color:var(--accent)"></div>
    <button class="btn btn-ghost" style="width:100%; color:var(--danger)" onclick="location.reload()">Abmelden</button>
  </div>
</aside>

<main id="content">
  <header id="header">
    <div style="display:flex; align-items:center; justify-content:space-between">
      <div style="display:flex; align-items:center; gap:12px">
        <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:24px">☰</button>
        <h2 id="current-event-name" style="font-size:18px">Lade...</h2>
      </div>
      <button id="admin-ev-edit" class="btn btn-ghost" style="display:none" onclick="openEventEdit()">⚙️</button>
    </div>
    <div class="stats-grid" id="stats-ui" style="display:none">
      <div class="stat-card"><span class="stat-lbl">Aufgaben</span><span class="stat-val" id="stat-progress">-</span></div>
      <div class="stat-card" id="stat-budget-card"><span class="stat-lbl">Kosten</span><span class="stat-val" id="stat-budget">0 €</span></div>
      <div class="stat-card"><span class="stat-lbl">Zeit bis</span><span class="stat-val" id="stat-days">-</span></div>
    </div>
  </header>

  <div id="main-scroll">
    <div id="task-list"></div>
    <button class="btn btn-primary" id="add-btn" onclick="addTask()" style="width:100%; margin-top:20px; display:none">+ Aufgabe hinzufügen</button>
  </div>
</main>

<div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:20px">
  <div class="modal-box">
    <h3>Aufgabe bearbeiten</h3>
    <input type="text" id="ed-title" class="form-input" placeholder="Titel">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <div><label style="font-size:11px">Kategorie</label><select id="ed-cat" class="form-input"></select></div>
      <div><label style="font-size:11px">Zuständig</label><select id="ed-assignee" class="form-input"></select></div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <div><label style="font-size:11px">Wochen vorher</label><input type="number" id="ed-weeks" class="form-input"></div>
      <div><label style="font-size:11px">Ist-Kosten €</label><input type="number" id="ed-cost" class="form-input"></div>
    </div>
    <textarea id="ed-notes" class="form-input" placeholder="Notizen..." style="height:80px"></textarea>
    <div style="display:flex; gap:10px">
      <button class="btn btn-danger" id="del-task-btn" onclick="deleteTask()">🗑️</button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeModals()">Abbr.</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveEdit()">Speichern</button>
    </div>
  </div>
</div>

<div id="event-edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:20px">
  <div class="modal-box">
    <h3>Fest-Einstellungen</h3>
    <input type="text" id="ev-edit-name" class="form-input" placeholder="Name">
    <input type="date" id="ev-edit-date" class="form-input">
    
    <h4 style="margin: 10px 0; color: var(--accent); border-bottom: 1px solid #333;">👥 User-Rollen für dieses Fest</h4>
    <div id="role-pool-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;"></div>

    <div style="display:flex; gap:10px">
      <button class="btn btn-danger" onclick="deleteEvent()">🗑️ Fest löschen</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveEventEdit()">Fertig</button>
    </div>
  </div>
</div>

<div id="user-mgmt-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3500; align-items:center; justify-content:center; padding:20px">
  <div class="modal-box">
    <h3>👥 Globaler Benutzer-Pool</h3>
    <div id="user-list-admin" style="margin-bottom:15px; max-height: 200px; overflow-y: auto;"></div>
    <input type="text" id="new-u-name" class="form-input" placeholder="Name">
    <input type="text" id="new-u-pass" class="form-input" placeholder="Passwort">
    <button class="btn btn-primary" style="width:100%" onclick="createNewUser()">User hinzufügen</button>
    <button class="btn btn-ghost" style="width:100%; margin-top:10px" onclick="closeModals()">Schließen</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBgEL-pylLEkGJfv7g5NxMsupH-teoD7wA",
    authDomain: "musikfest-planer.firebaseapp.com",
    databaseURL: "https://musikfest-planer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "musikfest-planer"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const CATEGORIES = {
    location: { label: "Location", color: "#c8a45a", icon: "⛺" },
    amt: { label: "Amt", color: "#7ab8d4", icon: "🏛️" },
    programm: { label: "Programm", color: "#9b7ec8", icon: "🎵" },
    werbung: { label: "Werbung", color: "#6bbf8e", icon: "📰" },
    bestellungen: { label: "Bestellungen", color: "#e07b5a", icon: "🍺" },
    finanzen: { label: "Finanzen", color: "#d4a847", icon: "💰" },
    sonstiges: { label: "Sonstiges", color: "#888888", icon: "⚙️" }
  };

  let state = { events: {}, users: {}, currentUser: null, currentEventId: 'home' };
  let activeTaskId = null, activeTaskEventId = null;

  db.ref('festplaner_v4').on('value', snap => {
    const val = snap.val() || {};
    state.events = val.events || {};
    state.users = val.users || {};
    render();
  });

  function handleLogin() {
    const u = document.getElementById("login-user").value.toLowerCase().trim();
    const p = document.getElementById("login-pass").value.trim();
    if(u === 'admin' && p === '1234') {
        state.currentUser = {name: 'admin', isAdmin: true};
    } else {
        const user = state.users[u];
        if(user && user.pass === p) state.currentUser = user;
    }
    if(state.currentUser) {
        document.getElementById("login-screen").style.display = "none";
        if(state.currentUser.isAdmin) document.getElementById("admin-tools").style.display = "block";
        document.getElementById("user-info").innerHTML = `User: <b>${state.currentUser.name}</b>`;
        render();
    } else alert("Fehler!");
  }

  function getMyRole(evId) {
    if(state.currentUser?.isAdmin) return 'planer';
    return state.events[evId]?.roles?.[state.currentUser.name] || 'keine';
  }

  function render() {
    if(!state.currentUser) return;
    const sortedEvents = Object.entries(state.events).sort((a,b) => new Date(a[1].date||0) - new Date(b[1].date||0));
    
    document.getElementById("event-list-ui").innerHTML = sortedEvents.map(([id, ev]) => {
        const role = getMyRole(id);
        if(!state.currentUser.isAdmin && role === 'keine') return '';
        return `<div style="padding:10px; background:#1a1a30; border-radius:8px; margin-bottom:5px; cursor:pointer; border:1px solid ${id===state.currentEventId?'var(--accent)':'transparent'}" onclick="selectEvent('${id}')">
            <div style="font-weight:bold; font-size:13px">${ev.name}</div>
            <div style="font-size:9px; color:var(--accent)">${role}</div>
        </div>`;
    }).join('');

    const taskList = document.getElementById("task-list");
    const statsArea = document.getElementById("stats-ui");

    if(state.currentEventId === 'home') {
        document.getElementById("current-event-name").textContent = "Meine Aufgaben";
        statsArea.style.display = "none";
        document.getElementById("admin-ev-edit").style.display = "none";
        document.getElementById("add-btn").style.display = "none";
        let html = "";
        sortedEvents.forEach(([evId, ev]) => {
            const role = getMyRole(evId);
            let my = (ev.tasks || []).filter(t => t.assignee === state.currentUser.name && !t.done);
            if(my.length > 0) {
                html += `<div style="color:var(--accent); margin:15px 0 5px; font-size:11px; border-bottom:1px solid #222; padding-bottom:3px;">${ev.name}</div>`;
                my.forEach(t => html += renderTaskCard(t, evId, ev.date));
            }
        });
        taskList.innerHTML = html || "<p style='text-align:center; opacity:0.5; margin-top:40px;'>Alles erledigt! 😎</p>";
    } else {
        const ev = state.events[state.currentEventId];
        const role = getMyRole(state.currentEventId);
        document.getElementById("current-event-name").textContent = ev.name;
        statsArea.style.display = "grid";
        document.getElementById("admin-ev-edit").style.display = (role === 'planer') ? "block" : "none";
        document.getElementById("add-btn").style.display = (role !== 'keine') ? "block" : "none";
        document.getElementById("stat-budget-card").style.display = (role === 'planer') ? "block" : "none";

        let tasks = (ev.tasks || []);
        if(role !== 'planer') {
            tasks = tasks.filter(t => t.category !== 'finanzen');
            if(role === 'helfer') tasks = tasks.filter(t => t.assignee === state.currentUser.name);
        }
        taskList.innerHTML = tasks.length ? tasks.map(t => renderTaskCard(t, state.currentEventId, ev.date)).join('') : "Keine Aufgaben.";
        document.getElementById("stat-progress").textContent = `${ev.tasks?.filter(t=>t.done).length || 0} / ${ev.tasks?.length || 0}`;
        document.getElementById("stat-budget").textContent = `${(ev.tasks || []).reduce((sum, t) => sum + (parseFloat(t.cost) || 0), 0).toFixed(0)} €`;
    }
  }

  function renderTaskCard(t, evId, evDate) {
    const role = getMyRole(evId);
    const cat = CATEGORIES[t.category] || CATEGORIES.sonstiges;
    // Kosten werden angezeigt wenn: User ist Planer ODER User ist der zugewiesene Helfer
    const showCost = (role === 'planer' || t.assignee === state.currentUser.name);
    return `
      <div class="task-card ${t.done?'status-done':''}">
        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${evId}', ${t.id})" style="width:22px; height:22px">
        <div class="cat-box" style="background:${cat.color}22; color:${cat.color}">${cat.icon}</div>
        <div class="task-info" onclick="openEdit('${evId}', ${t.id})">
          <div style="font-weight:bold; font-size:14px; display:flex; justify-content:space-between; align-items:center;">
            <span>${t.title}</span>
            ${(showCost && t.cost) ? `<span style="color:var(--safe); font-size:12px;">${t.cost}€</span>` : ''}
          </div>
          <div style="font-size:10px; color:#707090; margin-top:4px;">${t.assignee || 'Offen'}</div>
        </div>
      </div>`;
  }

  function openEventEdit() {
    const ev = state.events[state.currentEventId];
    document.getElementById("ev-edit-name").value = ev.name;
    document.getElementById("ev-edit-date").value = ev.date || "";
    
    // User-Liste mit schnellen Rollen-Buttons
    let h = "";
    Object.values(state.users).forEach(u => {
        const currentRole = ev.roles?.[u.name] || 'keine';
        h += `
        <div class="role-row">
            <span style="font-size:13px">${u.name}</span>
            <div class="role-btns">
                <button class="role-btn ${currentRole==='keine'?'active':''}" onclick="setRole('${u.name}','keine')">Aus</button>
                <button class="role-btn ${currentRole==='helfer'?'active':''}" onclick="setRole('${u.name}','helfer')">Helfer</button>
                <button class="role-btn ${currentRole==='helferVIP'?'active':''}" onclick="setRole('${u.name}','VIP')">VIP</button>
            </div>
        </div>`;
    });
    document.getElementById("role-pool-list").innerHTML = h;
    document.getElementById("event-edit-modal").style.display = "flex";
  }

  function setRole(userName, role) {
    db.ref(`festplaner_v4/events/${state.currentEventId}/roles/${userName}`).set(role);
    setTimeout(openEventEdit, 100); // UI Refresh
  }

  function openEdit(evId, taskId) {
    activeTaskEventId = evId; activeTaskId = taskId;
    const ev = state.events[evId];
    const t = ev.tasks.find(x => x.id === taskId);
    const role = getMyRole(evId);
    document.getElementById("ed-title").value = t.title;
    document.getElementById("ed-cost").value = t.cost || 0;
    document.getElementById("ed-notes").value = t.notes || "";
    document.getElementById("ed-cat").innerHTML = Object.entries(CATEGORIES).filter(([k]) => role === 'planer' || k !== 'finanzen').map(([k,c]) => `<option value="${k}" ${t.category===k?'selected':''}>${c.icon} ${c.label}</option>`).join('');
    const uList = Object.keys(ev.roles || {}).filter(n => ev.roles[n] !== 'keine');
    document.getElementById("ed-assignee").innerHTML = '<option value="">Offen</option>' + uList.map(u => `<option value="${u}" ${t.assignee===u?'selected':''}>${u}</option>`).join('');
    document.getElementById("edit-modal").style.display = "flex";
  }

  function saveEdit() {
    const tasks = [...state.events[activeTaskEventId].tasks];
    const idx = tasks.findIndex(x => x.id === activeTaskId);
    tasks[idx].title = document.getElementById("ed-title").value;
    tasks[idx].cost = parseFloat(document.getElementById("ed-cost").value) || 0;
    tasks[idx].notes = document.getElementById("ed-notes").value;
    tasks[idx].category = document.getElementById("ed-cat").value;
    tasks[idx].assignee = document.getElementById("ed-assignee").value;
    db.ref(`festplaner_v4/events/${activeTaskEventId}/tasks`).set(tasks);
    closeModals();
  }

  function toggleTask(evId, id) {
    const tasks = [...state.events[evId].tasks];
    const idx = tasks.findIndex(x => x.id === id);
    tasks[idx].done = !tasks[idx].done;
    db.ref(`festplaner_v4/events/${evId}/tasks`).set(tasks);
  }

  function selectEvent(id) { state.currentEventId = id; render(); if(window.innerWidth < 1024) toggleMenu(); }
  function toggleMenu() { document.getElementById("sidebar").classList.toggle("sidebar-hidden"); document.getElementById("overlay").style.display = document.getElementById("sidebar").classList.contains("sidebar-hidden") ? "none" : "block"; }
  function closeModals() { document.querySelectorAll('[id$="-modal"]').forEach(m => m.style.display = "none"); }
  function createNewUser() {
    const n = document.getElementById("new-u-name").value.toLowerCase().trim();
    const p = document.getElementById("new-u-pass").value.trim();
    if(n && p) db.ref('festplaner_v4/users/'+n).set({name:n, pass:p});
  }
  function openUserMgmt() {
    document.getElementById("user-list-admin").innerHTML = Object.values(state.users).map(u => `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #222;"><span>${u.name}</span><button onclick="db.ref('festplaner_v4/users/${u.name}').remove()" style="color:red; background:none; border:none">✖</button></div>`).join('');
    document.getElementById("user-mgmt-modal").style.display = "flex";
  }
  function openEventModal() { const n = prompt("Name?"); if(n) db.ref('festplaner_v4/events/ev_'+Date.now()).set({name:n, tasks: [], roles: {}}); }
  function saveEventEdit() { db.ref(`festplaner_v4/events/${state.currentEventId}`).update({name: document.getElementById("ev-edit-name").value, date: document.getElementById("ev-edit-date").value}); closeModals(); }
  function addTask() {
    const tasks = state.events[state.currentEventId].tasks || [];
    const id = Date.now();
    tasks.push({ id, title: "Neue Aufgabe", category: 'sonstiges', done: false, assignee: '' });
    db.ref(`festplaner_v4/events/${state.currentEventId}/tasks`).set(tasks);
    openEdit(state.currentEventId, id);
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎪 Vereins-Manager Pro</title>
<style>
  :root { --bg: #0d0d14; --panel: #16213e; --accent: #c8a45a; --text: #e8e8f0; --danger: #ff4444; --safe: #00c851; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: -apple-system, system-ui, sans-serif; 
    display: flex; 
    height: 100dvh; 
    overflow: hidden; 
  }

  /* Sidebar - Mobile Optimiert */
  #sidebar { 
    width: 280px; 
    background: #0a0a15; 
    border-right: 1px solid #2a2a4a; 
    display: flex; 
    flex-direction: column; 
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    position: absolute;
    top: 0; bottom: 0; left: 0;
    z-index: 2000;
  }
  .sidebar-hidden { transform: translateX(-100%); }
  
  /* Overlay wenn Sidebar offen ist */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; z-index: 1500;
  }

  .sidebar-header { padding: 20px; border-bottom: 1px solid #2a2a4a; display: flex; justify-content: space-between; align-items: center; }
  .event-list { flex: 1; overflow-y: auto; padding: 10px; }
  .event-item { padding: 15px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; background: #1a1a30; border: 1px solid transparent; }
  .event-item.active { border-color: var(--accent); background: #252545; }

  /* Main Content Area */
  #content { flex: 1; display: flex; flex-direction: column; width: 100%; min-width: 0; }
  
  #header { 
    background: linear-gradient(135deg,#1a1a2e, #0f3460); 
    padding: 15px; 
    border-bottom: 1px solid #2a2a5a; 
  }
  
  .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
  #menu-toggle { font-size: 28px; background: none; border: none; color: white; padding: 5px; cursor: pointer; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; text-align: center; }
  .stat-val { display: block; font-size: 14px; font-weight: bold; color: var(--accent); }
  .stat-lbl { font-size: 9px; color: #7070a0; text-transform: uppercase; }

  /* Task List & Filter */
  #main-scroll { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }

  .task-card { 
    background: #0f0f20; border-radius: 14px; padding: 15px; 
    border: 1px solid #252545; border-left: 5px solid #3a3a6a; 
    margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
  }
  .status-overdue { border-left-color: var(--danger); background: #251515; }
  .status-urgent { border-left-color: #ffbb33; background: #252015; }
  .status-done { opacity: 0.5; border-left-color: var(--safe); }

  .task-info { flex: 1; min-width: 0; }
  .task-title { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-meta { font-size: 12px; color: #7070a0; margin-top: 2px; }

  /* UI Elements */
  .btn { padding: 10px 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-ghost { background: #1a1a30; color: #fff; border: 1px solid #3a3a6a; }
  
  .checkbox-custom { width: 24px; height: 24px; accent-color: var(--safe); flex-shrink: 0; }

  /* Modals - Mobil optimiert */
  .modal-overlay { 
    position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
    display: none; align-items: center; justify-content: center; 
    z-index: 3000; padding: 15px; 
  }
  .modal-box { 
    background: #12121f; border: 1px solid #3a3a6a; border-radius: 20px; 
    padding: 20px; width: 100%; max-width: 450px; max-height: 85dvh; overflow-y: auto; 
  }
  .form-input { 
    width: 100%; background: #0d0d1a; border: 1px solid #3a3a6a; border-radius: 10px; 
    color: #fff; padding: 12px; margin-bottom: 12px; font-size: 16px; /* 16px verhindert Zoom-Effekt bei iOS */
  }

  #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: flex; align-items: center; justify-content: center; padding: 20px; }

  @media (min-width: 1024px) {
    #sidebar { position: relative; transform: none; }
    #menu-toggle { display: none; }
    #overlay { display: none !important; }
  }
</style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="login-screen">
  <div class="modal-box" style="text-align: center;">
    <h2 style="margin-bottom:20px">🔒 Vereins-Login</h2>
    <input type="password" id="login-pass" class="form-input" style="text-align:center" placeholder="Passwort">
    <button class="btn btn-primary" style="width:100%" onclick="checkLogin()">Einloggen</button>
    <p id="login-msg" style="color:var(--danger); margin-top:15px"></p>
  </div>
</div>

<aside id="sidebar" class="sidebar-hidden">
  <div class="sidebar-header">
    <h3>📂 Deine Feste</h3>
    <button onclick="toggleMenu()" class="btn-ghost" style="padding: 5px 10px;">✕</button>
  </div>
  <div class="event-list" id="event-list-ui"></div>
  <div style="padding: 15px;">
    <button class="btn btn-ghost" style="width:100%" onclick="openEventModal()">+ Neues Fest</button>
  </div>
</aside>

<main id="content">
  <header id="header">
    <div class="top-bar">
      <button id="menu-toggle" onclick="toggleMenu()">☰</button>
      <h2 id="current-event-name" style="font-size: 18px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Lädt...</h2>
      <button onclick="openSettings()" style="margin-left:auto; background:none; border:none; font-size:22px;">⚙️</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><span class="stat-lbl">Fortschritt</span><span class="stat-val" id="stat-progress">0%</span></div>
      <div class="stat-card"><span class="stat-lbl">Kosten</span><span class="stat-val" id="stat-budget">0€</span></div>
      <div class="stat-card"><span class="stat-lbl">Tage</span><span class="stat-val" id="stat-days">-</span></div>
    </div>
  </header>

  <div id="main-scroll">
    <div class="filter-row" id="cat-filters"></div>
    <div id="task-list"></div>
    <button class="btn btn-primary" onclick="addTask()" style="width:100%; margin-top:10px; position: sticky; bottom: 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.5);">+ Neue Aufgabe</button>
  </div>
</main>

<div class="modal-overlay" id="event-modal">
  <div class="modal-box">
    <h3>Neues Fest</h3>
    <input type="text" id="ev-name" class="form-input" placeholder="Name (z.B. Musikfest 2026)">
    <input type="date" id="ev-date" class="form-input">
    <div id="copy-options">
      <label style="font-size:11px; color:#7070a0">Aufgaben kopieren von:</label>
      <select id="ev-copy-source" class="form-input"></select>
    </div>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-ghost" style="flex:1" onclick="closeEventModal()">Abbrechen</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveEvent()">Speichern</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal-box">
    <h3>Aufgabe bearbeiten</h3>
    <label>Titel</label><input type="text" id="ed-title" class="form-input">
    <label>Zuständig</label><input type="text" id="ed-assignee" class="form-input">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <div><label>Kategorie</label><select id="ed-cat" class="form-input"></select></div>
      <div><label>Wochen davor</label><input type="number" id="ed-weeks" class="form-input"></div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <div><label>Budget (€)</label><input type="number" id="ed-cost-p" class="form-input"></div>
      <div><label>Ist (€)</label><input type="number" id="ed-cost-i" class="form-input"></div>
    </div>
    <label>Notizen</label><textarea id="ed-notes" class="form-input" rows="3"></textarea>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-danger" onclick="deleteTask()">🗑️</button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeEdit()">Aus</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveEdit()">Speichern</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBgEL-pylLEkGJfv7g5NxMsupH-teoD7wA",
    authDomain: "musikfest-planer.firebaseapp.com",
    databaseURL: "https://musikfest-planer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "musikfest-planer",
    storageBucket: "musikfest-planer.firebasestorage.app",
    messagingSenderId: "854695927344",
    appId: "1:854695927344:web:4e576eadb272376c3417f5"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const CATEGORIES = {
    zelt: { label: "Zelt", icon: "⛺" },
    behoerde: { label: "Amt", icon: "🏛️" },
    programm: { label: "Musik", icon: "🎵" },
    werbung: { label: "Werbung", icon: "📢" },
    lieferant: { label: "Logistik", icon: "🍺" },
    finanzen: { label: "Geld", icon: "💰" }
  };

  let state = { events: {}, currentEventId: null, config: { pass: "1234" }, filterCat: 'all' };

  function toggleMenu() {
    const sb = document.getElementById("sidebar");
    const ov = document.getElementById("overlay");
    const isHidden = sb.classList.toggle("sidebar-hidden");
    ov.style.display = isHidden ? "none" : "block";
  }

  db.ref('festplaner_v2').on('value', (snap) => {
    const data = snap.val();
    if(data) {
      state.events = data.events || {};
      state.config = data.config || state.config;
      if(!state.currentEventId && Object.keys(state.events).length > 0) state.currentEventId = Object.keys(state.events)[0];
      render();
    }
  });

  function sync() { db.ref('festplaner_v2').set({ events: state.events, config: state.config }); }

  function checkLogin() {
    if(document.getElementById("login-pass").value === state.config.pass) document.getElementById("login-screen").style.display = "none";
    else document.getElementById("login-msg").textContent = "Passwort falsch!";
  }

  function render() {
    const evListUI = document.getElementById("event-list-ui");
    evListUI.innerHTML = Object.entries(state.events).map(([id, ev]) => `
      <div class="event-item ${id === state.currentEventId ? 'active' : ''}" onclick="selectEvent('${id}')">
        <strong>${ev.name}</strong><br><small>${new Date(ev.date).toLocaleDateString()}</small>
      </div>
    `).join('');

    if(!state.currentEventId) return;
    const event = state.events[state.currentEventId];
    document.getElementById("current-event-name").textContent = event.name;

    const tasks = event.tasks || [];
    const done = tasks.filter(t => t.done).length;
    const progress = tasks.length ? Math.round(done/tasks.length*100) : 0;
    const budget = tasks.reduce((sum, t) => sum + (parseFloat(t.costI) || 0), 0);
    const diff = Math.ceil((new Date(event.date) - new Date()) / 86400000);

    document.getElementById("stat-progress").textContent = progress + "%";
    document.getElementById("stat-budget").textContent = Math.round(budget) + " €";
    document.getElementById("stat-days").textContent = diff;

    document.getElementById("cat-filters").innerHTML = `<button class="btn ${state.filterCat==='all'?'btn-primary':'btn-ghost'}" onclick="setFilter('all')">Alle</button>` + 
      Object.entries(CATEGORIES).map(([k,v]) => `<button class="btn ${state.filterCat===k?'btn-primary':'btn-ghost'}" onclick="setFilter('${k}')">${v.icon}</button>`).join('');

    const list = document.getElementById("task-list");
    const filtered = tasks.filter(t => state.filterCat === 'all' || t.cat === state.filterCat);
    filtered.sort((a,b) => a.done - b.done || b.weeksBefore - a.weeksBefore);

    list.innerHTML = filtered.map(t => {
      const deadline = new Date(new Date(event.date).getTime() - t.weeksBefore * 7 * 86400000);
      const dDiff = Math.ceil((deadline - new Date()) / 86400000);
      let cls = t.done ? "status-done" : (dDiff < 0 ? "status-overdue" : (dDiff <= 7 ? "status-urgent" : ""));

      return `
        <div class="task-card ${cls}">
          <input type="checkbox" class="checkbox-custom" ${t.done?'checked':''} onchange="toggleTask(${t.id})">
          <div class="task-info" onclick="openEdit(${t.id})">
            <div class="task-title">${t.title}</div>
            <div class="task-meta">${CATEGORIES[t.cat].icon} ${t.assignee || 'Offen'} • ${dDiff < 0 ? 'Überfällig' : 'In '+dDiff+' Tg.'}</div>
          </div>
          <span style="font-size:18px" onclick="openEdit(${t.id})">✏️</span>
        </div>
      `;
    }).join('');
  }

  function selectEvent(id) { state.currentEventId = id; render(); toggleMenu(); }
  function setFilter(c) { state.filterCat = c; render(); }
  function toggleTask(id) { 
    const t = state.events[state.currentEventId].tasks.find(x => x.id === id);
    t.done = !t.done; sync();
  }

  function openEventModal() { 
    document.getElementById("event-modal").style.display = "flex"; 
    document.getElementById("ev-copy-source").innerHTML = '<option value="none">Kein Kopieren</option>' + 
      Object.entries(state.events).map(([id, ev]) => `<option value="${id}">${ev.name}</option>`).join('');
  }
  function closeEventModal() { document.getElementById("event-modal").style.display = "none"; }
  function saveEvent() {
    const name = document.getElementById("ev-name").value;
    const date = document.getElementById("ev-date").value;
    const sourceId = document.getElementById("ev-copy-source").value;
    if(!name || !date) return;
    const id = "ev_" + Date.now();
    let tasks = sourceId !== "none" ? state.events[sourceId].tasks.map(t => ({...t, done:false, costI:0})) : [];
    state.events[id] = { name, date, tasks };
    state.currentEventId = id;
    sync(); closeEventModal();
  }

  let activeTaskId = null;
  function openEdit(id) {
    activeTaskId = id;
    const t = state.events[state.currentEventId].tasks.find(x => x.id === id);
    document.getElementById("ed-title").value = t.title;
    document.getElementById("ed-assignee").value = t.assignee || "";
    document.getElementById("ed-weeks").value = t.weeksBefore;
    document.getElementById("ed-cost-p").value = t.costP || 0;
    document.getElementById("ed-cost-i").value = t.costI || 0;
    document.getElementById("ed-notes").value = t.notes || "";
    document.getElementById("ed-cat").innerHTML = Object.entries(CATEGORIES).map(([k,v])=>`<option value="${k}" ${t.cat===k?'selected':''}>${v.label}</option>`).join('');
    document.getElementById("edit-modal").style.display = "flex";
  }
  function closeEdit() { document.getElementById("edit-modal").style.display = "none"; }
  function saveEdit() {
    const t = state.events[state.currentEventId].tasks.find(x => x.id === activeTaskId);
    t.title = document.getElementById("ed-title").value;
    t.assignee = document.getElementById("ed-assignee").value;
    t.cat = document.getElementById("ed-cat").value;
    t.weeksBefore = parseInt(document.getElementById("ed-weeks").value) || 0;
    t.costP = parseFloat(document.getElementById("ed-cost-p").value) || 0;
    t.costI = parseFloat(document.getElementById("ed-cost-i").value) || 0;
    t.notes = document.getElementById("ed-notes").value;
    sync(); closeEdit();
  }
  function addTask() {
    const id = Date.now();
    if(!state.events[state.currentEventId].tasks) state.events[state.currentEventId].tasks = [];
    state.events[state.currentEventId].tasks.push({ id, title: "Neue Aufgabe", cat: "werbung", weeksBefore: 4, done: false });
    sync(); openEdit(id);
  }
  function deleteTask() {
    if(confirm("Löschen?")) {
      state.events[state.currentEventId].tasks = state.events[state.currentEventId].tasks.filter(x => x.id !== activeTaskId);
      sync(); closeEdit();
    }
  }
  function openSettings() {
    const p = prompt("Neues Passwort?", state.config.pass);
    if(p) { state.config.pass = p; sync(); }
  }
</script>
</body>
</html>
